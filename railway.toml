# Railway service config — ss-to-wp-worker
# Builderis: DOCKERFILE (Nixpacks vietā — WeasyPrint prasa system libs,
# ko Nixpacks vide neredz; sk. Dockerfile).
#  - Service name: ss-to-wp-worker
#  - Project: brave-harmony
#  - Source: RGCommerce/ss-to-wp-worker (atsevišķs repo)
#  - Volume: existing "inbox-to-listings-volume" → mount /storage
#  - Env vars: kopēt no sslv-ai-runner-railway/crm/.env (sk. .env.example)

[build]
builder = "DOCKERFILE"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
